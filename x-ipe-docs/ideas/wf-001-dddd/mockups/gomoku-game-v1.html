<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 — Gomoku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --board-wood: #D4A76A;
    --board-wood-dark: #B8894A;
    --board-line: #8B6914;
    --board-line-alpha: rgba(90,55,10,0.72);
    --star-color: #5A370A;
    --bg-deep: #0E0B08;
    --bg-panel: #1A1410;
    --bg-card: rgba(30,24,18,0.85);
    --text-warm: #E8DCC8;
    --text-muted: #9C8B76;
    --text-bright: #FFF5E6;
    --accent: #C8956C;
    --accent-glow: rgba(200,149,108,0.35);
    --accent-green: #10b981;
    --accent-green-dim: rgba(16,185,129,0.2);
    --stone-black: #1C1C1C;
    --stone-white: #F0EDE8;
    --red-marker: #E85D4A;
    --win-glow: #FFD700;
    --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
    --font-ui: 'DM Sans', system-ui, sans-serif;
    --font-cn: 'Noto Serif SC', serif;
    --radius: 10px;
    --shadow-soft: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-stone: 0 3px 8px rgba(0,0,0,0.55);
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  html { font-size: 16px; }

  body {
    background: var(--bg-deep);
    color: var(--text-warm);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 40%, rgba(180,130,70,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 30% 60%, rgba(100,60,20,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 70% 30%, rgba(140,100,50,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    padding: 24px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ═══ HEADER ═══ */
  .header {
    text-align: center;
    padding: 16px 0 8px;
    animation: fadeDown 0.8s ease-out;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 0.08em;
    line-height: 1.1;
    text-shadow: 0 2px 12px rgba(200,149,108,0.2);
  }
  .header h1 .cn {
    font-family: var(--font-cn);
    font-weight: 700;
    margin-right: 0.3em;
  }

  .header .subtitle {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--text-muted);
    font-style: italic;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  /* ═══ TOP BAR (mode + status) ═══ */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    width: 100%;
    animation: fadeDown 0.8s 0.1s ease-out both;
  }

  .mode-selector {
    display: flex;
    background: var(--bg-card);
    border: 1px solid rgba(200,149,108,0.15);
    border-radius: var(--radius);
    overflow: hidden;
    backdrop-filter: blur(8px);
  }

  .mode-btn {
    font-family: var(--font-ui);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
    position: relative;
  }
  .mode-btn:hover { color: var(--text-warm); }
  .mode-btn.active {
    color: var(--text-bright);
    background: rgba(200,149,108,0.18);
  }
  .mode-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 20%; right: 20%;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }

  .status-display {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid rgba(200,149,108,0.12);
    border-radius: var(--radius);
    padding: 8px 18px;
    backdrop-filter: blur(8px);
    min-width: 200px;
    justify-content: center;
  }

  .turn-indicator {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(200,149,108,0.3);
    transition: var(--transition);
    flex-shrink: 0;
  }
  .turn-indicator.black { background: var(--stone-black); box-shadow: inset 0 -2px 4px rgba(255,255,255,0.1); }
  .turn-indicator.white { background: var(--stone-white); box-shadow: inset 0 -2px 4px rgba(0,0,0,0.15); }

  .status-text {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-warm);
    white-space: nowrap;
  }
  .status-text .turn-count {
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-left: 6px;
  }

  /* ═══ BOARD CONTAINER ═══ */
  .board-wrapper {
    position: relative;
    animation: fadeUp 0.9s 0.2s ease-out both;
  }

  .board-shadow {
    position: relative;
    border-radius: 14px;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,220,160,0.08);
    border: 3px solid rgba(100,70,30,0.4);
  }

  canvas#board {
    display: block;
    border-radius: 12px;
    cursor: pointer;
  }

  /* Hover coordinate tooltip */
  .coord-tooltip {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-ui);
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    text-transform: uppercase;
  }
  .coord-tooltip.visible { opacity: 1; }

  /* ═══ CONTROLS ═══ */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    animation: fadeUp 0.9s 0.3s ease-out both;
  }

  .btn {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: var(--radius);
    border: 1px solid rgba(200,149,108,0.2);
    background: var(--bg-card);
    color: var(--text-warm);
    cursor: pointer;
    transition: var(--transition);
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,149,108,0.1), transparent);
    opacity: 0;
    transition: var(--transition);
  }
  .btn:hover { border-color: rgba(200,149,108,0.4); color: var(--text-bright); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .btn.primary {
    background: linear-gradient(135deg, rgba(200,149,108,0.25), rgba(180,130,80,0.15));
    border-color: rgba(200,149,108,0.35);
    color: var(--text-bright);
  }
  .btn.primary:hover {
    background: linear-gradient(135deg, rgba(200,149,108,0.35), rgba(180,130,80,0.25));
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ═══ SCORE TRACKER ═══ */
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 12px 28px;
    background: var(--bg-card);
    border: 1px solid rgba(200,149,108,0.1);
    border-radius: var(--radius);
    backdrop-filter: blur(8px);
    animation: fadeUp 0.9s 0.35s ease-out both;
  }

  .score-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .score-item .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .score-item .dot.b { background: var(--stone-black); border: 1px solid rgba(255,255,255,0.15); }
  .score-item .dot.w { background: var(--stone-white); border: 1px solid rgba(0,0,0,0.1); }
  .score-item .dot.d { background: var(--text-muted); }
  .score-item .label { color: var(--text-muted); }
  .score-item .val { color: var(--text-bright); font-weight: 700; font-size: 1rem; }
  .score-divider {
    width: 1px;
    height: 20px;
    background: rgba(200,149,108,0.15);
  }

  /* ═══ WIN OVERLAY ═══ */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,8,5,0.75);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .win-overlay.active { opacity: 1; pointer-events: all; }

  .win-card {
    background: linear-gradient(145deg, #1E1812, #2A2018);
    border: 1px solid rgba(200,149,108,0.25);
    border-radius: 20px;
    padding: 48px 56px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 80px var(--accent-glow);
    transform: scale(0.9);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .win-overlay.active .win-card { transform: scale(1); }

  .win-card .emoji { font-size: 3rem; margin-bottom: 12px; }
  .win-card h2 {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 8px;
  }
  .win-card p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  /* ═══ ANIMATIONS ═══ */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 16px 4px var(--accent-glow); }
  }
  @keyframes stonePlace {
    0% { transform: scale(0.5); opacity: 0.6; }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 768px) {
    .header h1 { font-size: 1.8rem; }
    .top-bar { gap: 10px; }
    .score-bar { gap: 20px; padding: 10px 18px; }
    .controls { gap: 8px; }
    .btn { padding: 8px 16px; font-size: 0.72rem; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <h1><span class="cn">五子棋</span> Gomoku</h1>
    <p class="subtitle">Five in a Row — The Art of Strategy</p>
  </header>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="pvp">Human vs Human</button>
      <button class="mode-btn" data-mode="pvai">Human vs AI</button>
    </div>
    <div class="status-display">
      <div class="turn-indicator black" id="turnDot"></div>
      <span class="status-text" id="statusText">Black's turn<span class="turn-count" id="turnCount">Move 1</span></span>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrapper">
    <div class="coord-tooltip" id="coordTooltip"></div>
    <div class="board-shadow">
      <canvas id="board"></canvas>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" id="undoBtn" disabled>↩ Undo</button>
    <button class="btn primary" id="newGameBtn">✦ New Game</button>
  </div>

  <!-- Score Bar -->
  <div class="score-bar">
    <div class="score-item">
      <span class="dot b"></span>
      <span class="label">Black</span>
      <span class="val" id="scoreBlack">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <span class="dot d"></span>
      <span class="label">Draws</span>
      <span class="val" id="scoreDraws">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <span class="dot w"></span>
      <span class="label">White</span>
      <span class="val" id="scoreWhite">0</span>
    </div>
  </div>
</div>

<!-- Win Overlay -->
<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <div class="emoji" id="winEmoji">🎉</div>
    <h2 id="winTitle">Black Wins!</h2>
    <p id="winMsg">Five in a row — a masterful victory</p>
    <button class="btn primary" id="playAgainBtn">✦ Play Again</button>
  </div>
</div>

<script>
(() => {
  // ═══ CONSTANTS ═══
  const SIZE = 15;
  const STAR_POINTS = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
  const COLS = 'ABCDEFGHIJKLMNO';

  // Sizing
  const CELL = 40;
  const PAD = 36;
  const LABEL_PAD = 22;
  const BOARD_PX = (SIZE - 1) * CELL;
  const CANVAS_W = BOARD_PX + PAD * 2 + LABEL_PAD;
  const CANVAS_H = BOARD_PX + PAD * 2 + LABEL_PAD;
  const OFF_X = PAD + LABEL_PAD;
  const OFF_Y = PAD;

  // ═══ STATE ═══
  let board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  let history = [];
  let currentPlayer = 1; // 1=black, 2=white
  let gameOver = false;
  let winCells = null;
  let mode = 'pvp';
  let score = { black: 0, white: 0, draws: 0 };
  let hoverR = -1, hoverC = -1;
  let lastAnimTime = 0;

  // ═══ DOM ═══
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const turnDot = document.getElementById('turnDot');
  const statusText = document.getElementById('statusText');
  const turnCount = document.getElementById('turnCount');
  const undoBtn = document.getElementById('undoBtn');
  const newGameBtn = document.getElementById('newGameBtn');
  const coordTooltip = document.getElementById('coordTooltip');
  const winOverlay = document.getElementById('winOverlay');
  const winTitle = document.getElementById('winTitle');
  const winMsg = document.getElementById('winMsg');
  const winEmoji = document.getElementById('winEmoji');
  const playAgainBtn = document.getElementById('playAgainBtn');

  // DPR
  const dpr = window.devicePixelRatio || 1;
  canvas.width = CANVAS_W * dpr;
  canvas.height = CANVAS_H * dpr;
  canvas.style.width = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';
  ctx.scale(dpr, dpr);

  // ═══ WOOD TEXTURE GENERATION ═══
  function drawWoodBoard() {
    // Base wood color
    const grad = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
    grad.addColorStop(0, '#D8AE6E');
    grad.addColorStop(0.3, '#D4A664');
    grad.addColorStop(0.5, '#CFA05E');
    grad.addColorStop(0.7, '#D6AA68');
    grad.addColorStop(1, '#CBa060');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Wood grain lines
    ctx.save();
    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 60; i++) {
      const y = Math.random() * CANVAS_H;
      const w = 0.5 + Math.random() * 1.5;
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x < CANVAS_W; x += 20) {
        ctx.lineTo(x, y + Math.sin(x * 0.01 + i) * (3 + Math.random() * 5));
      }
      ctx.strokeStyle = i % 3 === 0 ? '#8B6914' : '#A07828';
      ctx.lineWidth = w;
      ctx.stroke();
    }
    ctx.restore();

    // Subtle vignette
    const vig = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, CANVAS_W * 0.25, CANVAS_W/2, CANVAS_H/2, CANVAS_W * 0.7);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.12)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // ═══ DRAW GRID ═══
  function drawGrid() {
    ctx.strokeStyle = 'rgba(90,55,10,0.65)';
    ctx.lineWidth = 1;

    for (let i = 0; i < SIZE; i++) {
      // Vertical
      ctx.beginPath();
      ctx.moveTo(OFF_X + i * CELL, OFF_Y);
      ctx.lineTo(OFF_X + i * CELL, OFF_Y + BOARD_PX);
      ctx.stroke();
      // Horizontal
      ctx.beginPath();
      ctx.moveTo(OFF_X, OFF_Y + i * CELL);
      ctx.lineTo(OFF_X + BOARD_PX, OFF_Y + i * CELL);
      ctx.stroke();
    }

    // Border
    ctx.strokeStyle = 'rgba(90,55,10,0.8)';
    ctx.lineWidth = 2;
    ctx.strokeRect(OFF_X, OFF_Y, BOARD_PX, BOARD_PX);
  }

  // ═══ DRAW STAR POINTS ═══
  function drawStarPoints() {
    ctx.fillStyle = '#5A370A';
    STAR_POINTS.forEach(([r, c]) => {
      ctx.beginPath();
      ctx.arc(OFF_X + c * CELL, OFF_Y + r * CELL, 4, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // ═══ DRAW LABELS ═══
  function drawLabels() {
    ctx.font = '600 11px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(90,55,10,0.55)';

    for (let i = 0; i < SIZE; i++) {
      // Column labels (A-O) — top
      ctx.fillText(COLS[i], OFF_X + i * CELL, OFF_Y + BOARD_PX + 18);
      // Row labels (15 down to 1) — left
      ctx.fillText(String(SIZE - i), OFF_X - 18, OFF_Y + i * CELL);
    }
  }

  // ═══ DRAW STONE ═══
  function drawStone(r, c, player, animated = false) {
    const x = OFF_X + c * CELL;
    const y = OFF_Y + r * CELL;
    const radius = CELL * 0.42;

    ctx.save();

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;

    if (player === 1) {
      // Black stone
      const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, radius * 0.1, x, y, radius);
      grad.addColorStop(0, '#555');
      grad.addColorStop(0.4, '#333');
      grad.addColorStop(0.8, '#1a1a1a');
      grad.addColorStop(1, '#0a0a0a');
      ctx.fillStyle = grad;
    } else {
      // White stone
      const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, radius * 0.1, x, y, radius);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.4, '#F5F2ED');
      grad.addColorStop(0.8, '#E8E2DA');
      grad.addColorStop(1, '#D8D0C5');
      ctx.fillStyle = grad;
    }

    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();

    // Glossy highlight
    ctx.shadowColor = 'transparent';
    const hlGrad = ctx.createRadialGradient(x - radius * 0.25, y - radius * 0.3, 0, x - radius * 0.25, y - radius * 0.3, radius * 0.5);
    hlGrad.addColorStop(0, player === 1 ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.55)');
    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hlGrad;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ═══ DRAW LAST MOVE MARKER ═══
  function drawLastMoveMarker(r, c) {
    const x = OFF_X + c * CELL;
    const y = OFF_Y + r * CELL;
    ctx.fillStyle = '#E85D4A';
    ctx.beginPath();
    ctx.arc(x, y, 4.5, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#E85D4A';
    ctx.beginPath();
    ctx.arc(x, y, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ═══ DRAW WIN HIGHLIGHT ═══
  function drawWinHighlight(cells) {
    cells.forEach(([r, c]) => {
      const x = OFF_X + c * CELL;
      const y = OFF_Y + r * CELL;
      const radius = CELL * 0.46;

      // Golden glow ring
      ctx.save();
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      ctx.shadowColor = 'rgba(255,215,0,0.6)';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });
  }

  // ═══ DRAW HOVER PREVIEW ═══
  function drawHoverPreview(r, c) {
    if (r < 0 || c < 0 || board[r][c] !== 0 || gameOver) return;
    const x = OFF_X + c * CELL;
    const y = OFF_Y + r * CELL;
    const radius = CELL * 0.38;

    ctx.save();
    ctx.globalAlpha = 0.3;
    if (currentPlayer === 1) {
      ctx.fillStyle = '#333';
    } else {
      ctx.fillStyle = '#E0D8CE';
    }
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ═══ FULL RENDER ═══
  function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawWoodBoard();
    drawGrid();
    drawStarPoints();
    drawLabels();

    // Stones
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c]) drawStone(r, c, board[r][c]);
      }
    }

    // Last move marker
    if (history.length > 0) {
      const last = history[history.length - 1];
      drawLastMoveMarker(last.row, last.col);
    }

    // Win highlight
    if (winCells) drawWinHighlight(winCells);

    // Hover preview
    drawHoverPreview(hoverR, hoverC);
  }

  // ═══ WIN DETECTION ═══
  function checkWin(r, c, player) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let cells = [[r, c]];
      // Forward
      for (let i = 1; i < SIZE; i++) {
        const nr = r + dr * i, nc = c + dc * i;
        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || board[nr][nc] !== player) break;
        cells.push([nr, nc]);
      }
      // Backward
      for (let i = 1; i < SIZE; i++) {
        const nr = r - dr * i, nc = c - dc * i;
        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || board[nr][nc] !== player) break;
        cells.push([nr, nc]);
      }
      if (cells.length >= 5) return cells;
    }
    return null;
  }

  // ═══ AI ═══
  const PATTERNS = {
    win5:     100000,
    live4:    10000,
    dead4:    5000,
    live3:    1000,
    halfOpen3: 100,
    live2:    50,
  };

  function evaluateLine(cells, player) {
    const opp = player === 1 ? 2 : 1;
    let score = 0;
    for (let start = 0; start <= cells.length - 5; start++) {
      const window = cells.slice(start, start + 5);
      const mine = window.filter(v => v === player).length;
      const theirs = window.filter(v => v === opp).length;
      if (theirs > 0) continue;
      if (mine === 5) score += PATTERNS.win5;
      else if (mine === 4) {
        const openEnds = (start > 0 && cells[start-1] === 0 ? 1 : 0) +
                         (start + 5 < cells.length && cells[start+5] === 0 ? 1 : 0);
        score += openEnds === 2 ? PATTERNS.live4 : PATTERNS.dead4;
      }
      else if (mine === 3) {
        const openEnds = (start > 0 && cells[start-1] === 0 ? 1 : 0) +
                         (start + 5 < cells.length && cells[start+5] === 0 ? 1 : 0);
        score += openEnds === 2 ? PATTERNS.live3 : PATTERNS.halfOpen3;
      }
      else if (mine === 2) score += PATTERNS.live2;
    }
    return score;
  }

  function getLine(r, c, dr, dc) {
    const cells = [];
    let rr = r, cc = c;
    while (rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE) { rr -= dr; cc -= dc; }
    rr += dr; cc += dc;
    while (rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE) {
      cells.push(board[rr][cc]);
      rr += dr; cc += dc;
    }
    return cells;
  }

  function aiMove() {
    const aiPlayer = 2;
    const humanPlayer = 1;
    let bestScore = -1, bestMoves = [];

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] !== 0) continue;
        // Only consider cells near existing stones
        let near = false;
        for (let dr = -2; dr <= 2 && !near; dr++) {
          for (let dc = -2; dc <= 2 && !near; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] !== 0) near = true;
          }
        }
        if (!near && history.length > 0) continue;

        board[r][c] = aiPlayer;
        let aScore = 0;
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (const [dr, dc] of dirs) {
          // Offense
          const lineA = [];
          let rr = r - 4*dr, cc = c - 4*dc;
          for (let i = 0; i < 9; i++) {
            const nr = rr + i*dr, nc = cc + i*dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) lineA.push(board[nr][nc]);
          }
          aScore += evaluateLine(lineA, aiPlayer);
        }
        board[r][c] = 0;

        // Defense
        board[r][c] = humanPlayer;
        let dScore = 0;
        for (const [dr, dc] of dirs) {
          const lineD = [];
          let rr2 = r - 4*dr, cc2 = c - 4*dc;
          for (let i = 0; i < 9; i++) {
            const nr = rr2 + i*dr, nc = cc2 + i*dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) lineD.push(board[nr][nc]);
          }
          dScore += evaluateLine(lineD, humanPlayer);
        }
        board[r][c] = 0;

        const total = aScore * 1.1 + dScore;
        if (total > bestScore) { bestScore = total; bestMoves = [[r, c]]; }
        else if (total === bestScore) bestMoves.push([r, c]);
      }
    }

    if (bestMoves.length === 0) {
      // First move or fallback: center
      return [7, 7];
    }
    return bestMoves[Math.floor(Math.random() * bestMoves.length)];
  }

  // ═══ PLACE STONE ═══
  function placeStone(r, c) {
    if (board[r][c] !== 0 || gameOver) return false;
    board[r][c] = currentPlayer;
    history.push({ row: r, col: c, player: currentPlayer });

    const win = checkWin(r, c, currentPlayer);
    if (win) {
      winCells = win;
      gameOver = true;
      if (currentPlayer === 1) score.black++;
      else score.white++;
      updateUI();
      render();
      showWin(currentPlayer);
      return true;
    }

    // Draw?
    if (history.length === SIZE * SIZE) {
      gameOver = true;
      score.draws++;
      updateUI();
      render();
      showWin(0);
      return true;
    }

    currentPlayer = currentPlayer === 1 ? 2 : 1;
    updateUI();
    render();

    // AI turn
    if (mode === 'pvai' && currentPlayer === 2 && !gameOver) {
      setTimeout(() => {
        const [ar, ac] = aiMove();
        placeStone(ar, ac);
      }, 200);
    }

    return true;
  }

  // ═══ UNDO ═══
  function undo() {
    if (history.length === 0 || gameOver) return;
    const count = mode === 'pvai' ? Math.min(2, history.length) : 1;
    for (let i = 0; i < count; i++) {
      const move = history.pop();
      board[move.row][move.col] = 0;
    }
    currentPlayer = history.length > 0 ? (history[history.length - 1].player === 1 ? 2 : 1) : 1;
    winCells = null;
    updateUI();
    render();
  }

  // ═══ NEW GAME ═══
  function newGame() {
    board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
    history = [];
    currentPlayer = 1;
    gameOver = false;
    winCells = null;
    winOverlay.classList.remove('active');
    updateUI();
    render();
  }

  // ═══ UI UPDATES ═══
  function updateUI() {
    const isBlack = currentPlayer === 1;
    turnDot.className = 'turn-indicator ' + (isBlack ? 'black' : 'white');

    if (gameOver) {
      if (winCells) {
        const winner = board[winCells[0][0]][winCells[0][1]];
        statusText.innerHTML = `<strong>${winner === 1 ? 'Black' : 'White'} wins!</strong>`;
      } else {
        statusText.innerHTML = '<strong>Draw!</strong>';
      }
    } else {
      statusText.innerHTML = `${isBlack ? 'Black' : 'White'}'s turn<span class="turn-count">Move ${history.length + 1}</span>`;
    }

    undoBtn.disabled = history.length === 0 || gameOver;
    document.getElementById('scoreBlack').textContent = score.black;
    document.getElementById('scoreWhite').textContent = score.white;
    document.getElementById('scoreDraws').textContent = score.draws;
  }

  function showWin(player) {
    setTimeout(() => {
      if (player === 0) {
        winEmoji.textContent = '🤝';
        winTitle.textContent = 'Draw!';
        winMsg.textContent = 'The board is full — a rare stalemate';
      } else {
        winEmoji.textContent = '🎉';
        winTitle.textContent = `${player === 1 ? 'Black' : 'White'} Wins!`;
        winMsg.textContent = 'Five in a row — a masterful victory';
      }
      winOverlay.classList.add('active');
    }, 600);
  }

  // ═══ EVENTS ═══
  function getCell(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const c = Math.round((mx - OFF_X) / CELL);
    const r = Math.round((my - OFF_Y) / CELL);
    if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return [-1, -1];
    // Check distance to intersection
    const dx = mx - (OFF_X + c * CELL);
    const dy = my - (OFF_Y + r * CELL);
    if (Math.sqrt(dx * dx + dy * dy) > CELL * 0.5) return [-1, -1];
    return [r, c];
  }

  canvas.addEventListener('click', (e) => {
    if (gameOver) return;
    if (mode === 'pvai' && currentPlayer === 2) return;
    const [r, c] = getCell(e);
    if (r >= 0 && c >= 0) placeStone(r, c);
  });

  canvas.addEventListener('mousemove', (e) => {
    const [r, c] = getCell(e);
    if (r !== hoverR || c !== hoverC) {
      hoverR = r;
      hoverC = c;
      render();
      if (r >= 0 && c >= 0) {
        coordTooltip.textContent = `${COLS[c]}${SIZE - r}`;
        coordTooltip.classList.add('visible');
        const rect = canvas.getBoundingClientRect();
        coordTooltip.style.left = (OFF_X + c * CELL) + 'px';
      } else {
        coordTooltip.classList.remove('visible');
      }
    }
  });

  canvas.addEventListener('mouseleave', () => {
    hoverR = -1; hoverC = -1;
    coordTooltip.classList.remove('visible');
    render();
  });

  // Mode selector
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.mode;
      newGame();
    });
  });

  undoBtn.addEventListener('click', undo);
  newGameBtn.addEventListener('click', newGame);
  playAgainBtn.addEventListener('click', newGame);

  // ═══ INIT ═══
  render();
  updateUI();
})();
</script>
</body>
</html>
