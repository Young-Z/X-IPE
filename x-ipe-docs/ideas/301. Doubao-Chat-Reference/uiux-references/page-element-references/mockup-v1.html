<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubao Chat — Mockup v1</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
  font-size: 16px;
  line-height: 24px;
  color: rgb(0, 0, 0);
  background: rgb(255, 255, 255);
  height: 100vh;
  overflow: hidden;
}

.app-container {
  display: flex;
  width: 100%;
  height: 100vh;
  background: rgb(255, 255, 255);
}

/* === SIDEBAR === */
.sidebar-nav {
  width: 280px;
  height: 100vh;
  background-color: rgb(243, 244, 246);
  padding: 12px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.brand-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  font-size: 16px;
  font-weight: 600;
  color: rgba(0, 0, 0, 0.85);
}

.brand-avatar-img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #edc4b8, #d4a094);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #3e2e2c;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}

.new-chat-button {
  display: flex;
  gap: 6px;
  align-items: center;
  height: 38px;
  padding: 0 8px;
  border-radius: 12px;
  background-color: rgba(0, 87, 255, 0.06);
  color: rgb(0, 87, 255);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.new-chat-button svg {
  width: 16px;
  height: 16px;
  color: rgb(0, 102, 255);
  flex-shrink: 0;
}

.nav-item {
  display: flex;
  align-items: center;
  height: 38px;
  padding: 0 8px;
  border-radius: 10px;
  color: rgba(0, 0, 0, 0.85);
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  text-decoration: none;
  gap: 8px;
}

.nav-item:hover {
  background-color: rgba(0, 0, 0, 0.04);
}

.nav-item svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: rgba(0, 0, 0, 0.85);
}

.nav-item-text {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.seedance-badge {
  font-size: 10px;
  font-weight: 600;
  color: rgb(0, 101, 253);
  border-radius: 4px;
  margin-left: 6px;
  padding: 0 4px;
  background: rgba(0, 101, 253, 0.06);
}

.expand-arrow {
  color: rgba(0, 0, 0, 0.3);
  font-size: 14px;
}

.history-section {
  flex: 1;
  overflow-y: auto;
  margin-top: 8px;
}

.history-label {
  font-size: 12px;
  font-weight: 600;
  color: rgba(0, 0, 0, 0.3);
  padding: 8px 8px 4px;
  position: sticky;
  top: 0;
  background: rgb(243, 244, 246);
  z-index: 30;
}

.sidebar-footer {
  padding: 4px 0;
  border-top: 0;
  margin-top: auto;
}

.sidebar-footer-about {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 12px;
  font-size: 14px;
  color: rgba(0, 0, 0, 0.5);
  cursor: pointer;
}

.sidebar-footer-about:hover {
  background: rgba(0, 0, 0, 0.04);
}

.sidebar-footer-about svg {
  width: 16px;
  height: 16px;
  color: rgba(0, 0, 0, 0.5);
}

/* === MAIN CONTENT === */
.main-content-area {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  background: rgb(255, 255, 255);
  position: relative;
}

.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  padding: 0 16px;
  z-index: 30;
  position: relative;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
}

.header-left button {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgb(0, 0, 0);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.download-button {
  width: 115px;
  height: 36px;
  border-radius: 12px;
  background-color: rgb(255, 255, 255);
  color: rgba(0, 0, 0, 0.85);
  font-size: 14px;
  font-weight: 500;
  border: 1px solid rgba(0, 0, 0, 0.08);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-family: inherit;
}

.login-button {
  width: 73px;
  height: 36px;
  border-radius: 12px;
  background-color: rgb(35, 38, 41);
  color: rgb(255, 255, 255);
  font-size: 14px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  font-family: inherit;
}

/* === CENTER CONTENT === */
.center-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-top: -130px;
  padding: 0 20px;
}

.hero-heading {
  font-size: 28px;
  font-weight: 600;
  color: rgb(0, 0, 0);
  text-align: center;
  margin-bottom: 28px;
  line-height: 42px;
}

.suggestion-chips-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  width: 800px;
}

.chip-row {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.suggestion-chip {
  height: 42px;
  padding: 10px 16px;
  border-radius: 12px;
  background-color: rgba(0, 0, 0, 0.04);
  color: rgb(0, 0, 0);
  font-size: 14px;
  font-weight: 400;
  line-height: 20px;
  display: flex;
  align-items: center;
  cursor: pointer;
  white-space: nowrap;
  transition: background-color 0.15s;
}

.suggestion-chip:hover {
  background-color: rgba(0, 0, 0, 0.08);
}

/* === CHAT INPUT === */
.chat-input-container {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
}

.chat-input-wrapper {
  width: 800px;
  min-height: 124px;
  border-radius: 24px;
  background-color: rgb(255, 255, 255);
  box-shadow: rgba(116, 158, 243, 0.02) 0px 2px 4px 0px,
              rgba(102, 188, 253, 0.04) 0px 4px 12px 0px,
              rgba(95, 178, 255, 0.17) 0px 8px 24px 0px;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.chat-textarea {
  width: 100%;
  font-size: 16px;
  color: rgba(0, 0, 0, 0.85);
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: inherit;
  line-height: 24px;
  min-height: 24px;
}

.chat-textarea::placeholder {
  color: rgba(0, 0, 0, 0.35);
}

.action-toolbar-row {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 36px;
  margin-top: 12px;
}

.attachment-button {
  width: 36px;
  height: 36px;
  border-radius: 9999px;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: rgba(0, 0, 0, 0.5);
}

.toolbar-separator {
  width: 1px;
  height: 16px;
  background: rgba(0, 0, 0, 0.08);
  margin: 0 4px;
  flex-shrink: 0;
}

.action-btn {
  height: 32px;
  padding: 0 12px;
  border-radius: 12px;
  font-size: 14px;
  color: rgb(0, 0, 0);
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  font-family: inherit;
  flex-shrink: 0;
  transition: background-color 0.15s;
}

.action-btn:hover {
  background-color: rgba(0, 0, 0, 0.04);
}

.action-btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.new-badge {
  font-size: 10px;
  font-weight: 600;
  border-radius: 6px;
  color: rgb(255, 107, 0);
  background: rgba(255, 107, 0, 0.08);
  padding: 0 4px;
  line-height: 16px;
}

.mic-button {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: auto;
  flex-shrink: 0;
  color: rgba(0, 0, 0, 0.5);
}

.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
}

.send-button {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.06);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(0, 0, 0, 0.3);
}
</style>
</head>
<body>

<div class="app-container">
  <!-- SIDEBAR -->
  <nav class="sidebar-nav">
    <div class="brand-logo">
      <div class="brand-avatar-img">豆</div>
      <span>豆包</span>
    </div>

    <div class="new-chat-button">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2l2 2-8 8H4v-2l8-8z"/>
      </svg>
      <span>新对话</span>
    </div>

    <a class="nav-item" href="#">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 3h4v4H3zM9 3h4v2H9zM3 9h4v4H3zM9 7h4v6H9z"/>
      </svg>
      <div class="nav-item-text">
        <span>AI 创作</span>
        <span class="seedance-badge">Seedance 2.0</span>
      </div>
    </a>

    <a class="nav-item" href="#">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h3v3H4zM9 4h3v3H9zM4 9h3v3H4zM9 9h3v3H9z"/>
      </svg>
      <div class="nav-item-text">
        <span>更多</span>
        <span class="expand-arrow">›</span>
      </div>
    </a>

    <div class="history-section">
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-about">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="6"/>
          <path d="M8 7v4M8 5.5v0"/>
        </svg>
        <span>关于豆包</span>
        <button style="margin-left:auto;width:32px;height:32px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.5)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 9h12M9 3v12M6 6l6 6M12 6l-6 6"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content-area">
    <div class="header-bar">
      <div class="header-left">
        <button>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 3v12"/>
            <path d="M3 3v12" stroke-dasharray="0"/>
            <path d="M3 3h6M3 15h6"/>
          </svg>
        </button>
      </div>
      <div class="header-right">
        <button class="download-button">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516.024.034 1.52.087 2.475-1.258.955-1.345.762-2.391.728-2.43zm3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422.212-2.189 1.675-2.789 1.698-2.854.023-.065-.597-.79-1.254-1.157a3.692 3.692 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56.244.729.625 1.924 1.273 2.796.576.984 1.34 1.667 1.659 1.899.319.232 1.219.386 1.843.067.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758.347-.79.505-1.217.473-1.282z"/>
          </svg>
          下载电脑版
        </button>
        <button class="login-button">登录</button>
      </div>
    </div>

    <div class="center-content">
      <div class="hero-heading">你好，我是豆包</div>

      <div class="suggestion-chips-grid">
        <div class="chip-row">
          <div class="suggestion-chip">写一份亮眼的季度工作总结</div>
          <div class="suggestion-chip">鸡蛋黄颜色越深越有营养吗？</div>
          <div class="suggestion-chip">分享一些冬季主题的小手工创意</div>
        </div>
        <div class="chip-row">
          <div class="suggestion-chip">生成独一无二的新年贺图</div>
          <div class="suggestion-chip">生成国风桌面壁纸</div>
          <div class="suggestion-chip">为什么许多经典动画人物都戴着手套？</div>
        </div>
        <div class="chip-row">
          <div class="suggestion-chip">为什么一首歌的高潮部分叫做副歌？</div>
          <div class="suggestion-chip">深色和浅色蔬菜营养有区别吗？</div>
          <div class="suggestion-chip">有哪些特别下饭的情景喜剧？</div>
        </div>
      </div>
    </div>

    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <textarea class="chat-textarea" placeholder='发消息或输入"/"选择技能' rows="1"></textarea>
        <div class="action-toolbar-row">
          <button class="attachment-button">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M15.5 9.5l-6.4 6.4a4.5 4.5 0 01-6.4-6.4l7.8-7.8a3 3 0 014.2 4.2L7 13.7a1.5 1.5 0 01-2.1-2.1l5.7-5.7"/>
            </svg>
          </button>
          <div class="toolbar-separator"></div>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 8l-5-5v3H3v4h5v3l5-5z"/></svg>
            快速
            <span class="new-badge">新</span>
          </button>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><circle cx="6" cy="6" r="1.5"/><path d="M2 11l3-3 2 2 3-4 4 5"/></svg>
            图像生成
          </button>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12M2 7h8M2 11h10M2 15h6"/></svg>
            帮我写作
          </button>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l6 4-6 4V4zM9 4l6 4-6 4V4z"/></svg>
            翻译
          </button>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2v12M8 2v12M12 6v8M2 6h4M6 10h4M10 6h4"/></svg>
            编程
          </button>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
            深入研究
          </button>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2a6 6 0 100 12A6 6 0 008 2z"/><path d="M6.5 6.5L10 8l-3.5 1.5"/></svg>
            AI 播客
          </button>
          <button class="action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="4" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="12" cy="8" r="1.5"/></svg>
            更多
          </button>
          <div class="toolbar-right">
            <button class="send-button">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M8 2v12M4 6l4-4 4 4"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

</body>
</html>
