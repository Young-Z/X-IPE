test_cases:
  - id: TC-001
    name: "Meta creator recognizes x-ipe-dao skill type"
    type: happy_path
    given: "Updated x-ipe-meta-skill-creator skill and templates"
    when: "Inspect skill type tables, input validation, and template mapping"
    then: "x-ipe-dao is listed with x-ipe-dao.md and skill-meta-x-ipe-dao.md"
    acceptance_criteria: [AC-S01, AC-S02, AC-S03]
    status: pending

  - id: TC-002
    name: "DAO skill supports direct answer"
    type: happy_path
    given: "A user-facing question the DAO can resolve from current context"
    when: "Inspect x-ipe-dao-end-user-representative skill examples and output contract"
    then: "Disposition answer is documented with bounded output"
    acceptance_criteria: [AC-C01, AC-C02, AC-B01]
    status: pending

  - id: TC-003
    name: "DAO skill supports pass-through"
    type: happy_path
    given: "A downstream-status question better handled by the worker agent"
    when: "Inspect x-ipe-dao-end-user-representative skill examples and operation steps"
    then: "Disposition pass_through is documented with preserved user intent"
    acceptance_criteria: [AC-C01, AC-B01]
    status: pending

  - id: TC-004
    name: "Human-shadow fallback uses AND logic"
    type: error_case
    given: "Low confidence mediation with human-shadow enabled"
    when: "Inspect output contract, important notes, and DoD"
    then: "fallback_required is only true when human_shadow is true and confidence is below the skill's internal threshold"
    acceptance_criteria: [AC-C03, AC-C04]
    status: pending
