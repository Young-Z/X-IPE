# Test Cases — Application Reverse Engineering Tool Skill
# Maps acceptance criteria to files and defines test scenarios

---

# AC-to-File Mapping
file_mapping:
  SKILL.md:
    - AC-S01  # Valid frontmatter
    - AC-S03  # Under 500 lines
    - AC-C01  # All required sections present
    - AC-C02  # 7 operations with XML structure
    - AC-C03  # Quality scoring weight tables
    - AC-C04  # Complexity gate thresholds
    - AC-C09  # Error handling table
    - AC-C10  # When to Use triggers
    - AC-C11  # Key Concepts in About
    - AC-C12  # Input Initialization
    - AC-C13  # Mixin composition rules
    - AC-C14  # Templates table
    - AC-B01  # get_artifacts returns correct paths
    - AC-B02  # get_mixin resolves correct files
    - AC-B03  # validate_section FAIL vs INCOMPLETE

  templates/playbook-template.md:
    - AC-C05  # 8 sections with phase annotations

  templates/collection-template.md:
    - AC-C06  # Extraction prompts in HTML comments

  templates/acceptance-criteria.md:
    - AC-C07  # [REQ]/[OPT] markers for all 8 sections

  templates/mixin-monorepo.md:
    - AC-C08  # Standard mixin structure
    - AC-S04  # Template file exists

  templates/mixin-multi-module.md:
    - AC-C08
    - AC-S04

  templates/mixin-single-module.md:
    - AC-C08
    - AC-S04

  templates/mixin-microservices.md:
    - AC-C08
    - AC-S04

  templates/mixin-python.md:
    - AC-C08
    - AC-S04

  templates/mixin-java.md:
    - AC-C08
    - AC-S04

  templates/mixin-javascript.md:
    - AC-C08
    - AC-S04

  templates/mixin-typescript.md:
    - AC-C08
    - AC-S04

  templates/mixin-go.md:
    - AC-C08
    - AC-S04

  references/examples.md:
    - AC-S02  # At least 1 example

---

# Structural Tests
structural_tests:
  - id: ST-01
    name: "SKILL.md frontmatter valid"
    ac: AC-S01
    method: yaml_parse
    target: SKILL.md
    checks:
      - "name == 'x-ipe-tool-knowledge-extraction-application-reverse-engineering'"
      - "'application-reverse-engineering' in categories"
      - "version exists"

  - id: ST-02
    name: "SKILL.md under 500 lines"
    ac: AC-S03
    method: line_count
    target: SKILL.md
    checks:
      - "line_count < 500"

  - id: ST-03
    name: "All 12 template files exist"
    ac: AC-S04
    method: file_exists
    target: templates/
    checks:
      - "playbook-template.md exists"
      - "collection-template.md exists"
      - "acceptance-criteria.md exists"
      - "mixin-monorepo.md exists"
      - "mixin-multi-module.md exists"
      - "mixin-single-module.md exists"
      - "mixin-microservices.md exists"
      - "mixin-python.md exists"
      - "mixin-java.md exists"
      - "mixin-javascript.md exists"
      - "mixin-typescript.md exists"
      - "mixin-go.md exists"

  - id: ST-04
    name: "examples.md exists with content"
    ac: AC-S02
    method: file_exists + content_check
    target: references/examples.md
    checks:
      - "file exists"
      - "contains at least 1 code block example"

---

# Content Tests
content_tests:
  - id: CT-01
    name: "All required sections in SKILL.md"
    ac: AC-C01
    method: section_parse
    target: SKILL.md
    checks:
      - "## Purpose"
      - "## Important Notes"
      - "## About"
      - "## When to Use"
      - "## Input Parameters"
      - "### Input Initialization"
      - "## Definition of Ready"
      - "## Operations"
      - "## Output Result"
      - "## Definition of Done"
      - "## Error Handling"
      - "## Templates"
      - "## Examples"

  - id: CT-02
    name: "7 operations with XML structure"
    ac: AC-C02
    method: regex_match
    target: SKILL.md
    checks:
      - '<operation name="get_artifacts">'
      - '<operation name="get_collection_template">'
      - '<operation name="validate_section">'
      - '<operation name="get_mixin">'
      - '<operation name="pack_section">'
      - '<operation name="score_quality">'
      - '<operation name="test_walkthrough">'

  - id: CT-03
    name: "Quality scoring weight tables"
    ac: AC-C03
    method: content_check
    target: SKILL.md
    checks:
      - "Architecture Sections"
      - "Tests Section"
      - "Other Sections"
      - "Accuracy"
      - "Coverage"
      - "0.35"
      - "0.50"
      - "0.30"

  - id: CT-04
    name: "Complexity gate thresholds"
    ac: AC-C04
    method: content_check
    target: SKILL.md
    checks:
      - "min_files: 10"
      - "min_loc: 500"
      - "min_dirs: 3"

  - id: CT-05
    name: "Playbook has 8 sections with phases"
    ac: AC-C05
    method: section_parse
    target: templates/playbook-template.md
    checks:
      - "Phase 1"
      - "Phase 2"
      - "Phase 3"
      - "Section 1" # or "1. Architecture Recovery"
      - "Section 2" # or "2. Design Pattern Detection"
      - "Section 3" # or "3. API Contract Extraction"
      - "Section 4" # or "4. Dependency Analysis"
      - "Section 5" # or "5. Code Structure Analysis"
      - "Section 6" # or "6. Data Flow"
      - "Section 7" # or "7. Technology Stack"
      - "Section 8" # or "8. Source Code Tests"

  - id: CT-06
    name: "Collection template has extraction prompts"
    ac: AC-C06
    method: regex_match
    target: templates/collection-template.md
    checks:
      - "<!-- EXTRACTION PROMPTS:"  # at least 8 occurrences

  - id: CT-07
    name: "Acceptance criteria has REQ/OPT markers"
    ac: AC-C07
    method: regex_match
    target: templates/acceptance-criteria.md
    checks:
      - "[REQ]"
      - "[OPT]"
      - "Section 1"
      - "Section 8"

  - id: CT-08
    name: "All mixins have standard structure"
    ac: AC-C08
    method: section_parse
    targets:
      - templates/mixin-monorepo.md
      - templates/mixin-multi-module.md
      - templates/mixin-single-module.md
      - templates/mixin-microservices.md
      - templates/mixin-python.md
      - templates/mixin-java.md
      - templates/mixin-javascript.md
      - templates/mixin-typescript.md
      - templates/mixin-go.md
    checks:
      - "## Detection Signals"
      - "Section Overlay Prompts"
      - "ADDITIONAL PROMPTS"

  - id: CT-09
    name: "Error handling table complete"
    ac: AC-C09
    method: table_parse
    target: SKILL.md
    checks:
      - "INVALID_OPERATION"
      - "MISSING_SECTION_ID"
      - "MISSING_CONTENT_PATH"
      - "CONTENT_NOT_FOUND"
      - "INVALID_MIXIN_KEY"
      - "TEMPLATE_NOT_FOUND"
      - "BELOW_COMPLEXITY_GATE"
